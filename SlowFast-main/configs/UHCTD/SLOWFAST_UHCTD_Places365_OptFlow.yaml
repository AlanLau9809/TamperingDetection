# ============================================================================
# SLOWFAST_UHCTD_Places365_OptFlow.yaml
# SlowFast R50 — UHCTD Camera Tampering Detection
# Slow Pathway initialised from Places365-inflated weights
# Fast Pathway: Optical Flow (2-channel)
# ============================================================================
#
# Methodology:
#   This config combines two innovations:
#   
#     1) Slow pathway (RGB) ← Places365 inflated weights
#         • Captures "what a normal surveillance scene looks like"
#         • Particularly benefits detection of 'Moved' events (scene changes)
#
#     2) Fast pathway (Optical Flow) ← Random initialisation
#         • Processes 2-channel optical flow (u, v components)
#         • Captures short-term motion anomalies
#         • Complementary to Places365 scene understanding
#
#     Fusion layers + Classification head ← Random initialisation
#
# Usage:
#   Step 1 — Inflate weights (if not already done):
#     cd TamperingDetection
#     python inflate_places365_to_slowfast.py \
#         --places365 ../Backup/UHCTD_Pretrained/resnet50_places365.pth.tar \
#         --config SlowFast-main/configs/UHCTD/SLOWFAST_UHCTD_Places365_OptFlow.yaml \
#         --output SlowFast-main/checkpoint/places365_slowfast_slow_pathway.pth
#
#   Step 2 — Train:
#     python train_uhctd_slowfast.py \
#         --experiment E1 \
#         --model SlowFast_R50_Places365_OptFlow \
#         --config SlowFast-main/configs/UHCTD/SLOWFAST_UHCTD_Places365_OptFlow.yaml \
#         --pretrained SlowFast-main/checkpoint/places365_slowfast_slow_pathway.pth \
#         --epochs 20 \
#         --patience 5
#
#   Step 3 — Evaluate:
#     python evaluate_uhctd_model.py \
#         --experiment E1 \
#         --model SlowFast_R50_Places365_OptFlow \
#         --config SlowFast-main/configs/UHCTD/SLOWFAST_UHCTD_Places365_OptFlow.yaml
# ============================================================================

TRAIN:
  ENABLE: True
  DATASET: uhctd
  BATCH_SIZE: 2            # Optical flow computation is heavier than RGB; reduce batch
  EVAL_PERIOD: 10
  CHECKPOINT_PERIOD: 1
  AUTO_RESUME: True
  CHECKPOINT_FILE_PATH: ""

DATA:
  PATH_TO_DATA_DIR: "/mnt/d/FYP/UHCTD/UHCTD Comprehensive Dataset For Camera Tampering Detection"
  PATH_PREFIX: "/mnt/d/FYP/UHCTD/UHCTD Comprehensive Dataset For Camera Tampering Detection"
  NUM_FRAMES: 32
  SAMPLING_RATE: 1         # Sample every frame (optical flow needs consecutive frames)
  TRAIN_JITTER_SCALES: [256, 320]
  TRAIN_CROP_SIZE: 224
  TEST_CROP_SIZE: 224
  # Slow pathway: 3-channel RGB (Places365 inflated)
  # Fast pathway: 2-channel Optical Flow (u, v components)
  INPUT_CHANNEL_NUM: [3, 2]
  # ImageNet-compatible normalisation for RGB channels
  # Flow channels use zero mean, unit std (standard for optical flow)
  MEAN: [0.485, 0.456, 0.406, 0.0, 0.0]
  STD:  [0.229, 0.224, 0.225, 1.0, 1.0]
  RANDOM_FLIP: True
  DECODING_BACKEND: pyav

SLOWFAST:
  ALPHA: 4               # Fast pathway runs at 4× frame rate of Slow
  BETA_INV: 8            # Fast pathway has 1/8 channels of Slow
  FUSION_CONV_CHANNEL_RATIO: 2
  FUSION_KERNEL_SZ: 7

RESNET:
  ZERO_INIT_FINAL_BN: True
  WIDTH_PER_GROUP: 64
  NUM_GROUPS: 1
  DEPTH: 50
  TRANS_FUNC: bottleneck_transform
  STRIDE_1X1: False
  NUM_BLOCK_TEMP_KERNEL: [[3, 3], [4, 4], [6, 6], [3, 3]]
  SPATIAL_STRIDES: [[1, 1], [2, 2], [2, 2], [2, 2]]
  SPATIAL_DILATIONS: [[1, 1], [1, 1], [1, 1], [1, 1]]

NONLOCAL:
  LOCATION: [[[], []], [[], []], [[], []], [[], []]]
  GROUP: [[1, 1], [1, 1], [1, 1], [1, 1]]
  INSTANTIATION: dot_product

BN:
  USE_PRECISE_STATS: True
  NUM_BATCHES_PRECISE: 200

SOLVER:
  # Fine-tuning from Places365 pretrained weights uses LOWER learning rate
  # to avoid destroying the Places365 features.
  # Flow pathway is random init, so this rate works well for both pathways.
  BASE_LR: 0.005
  LR_POLICY: cosine
  MAX_EPOCH: 30
  MOMENTUM: 0.9
  WEIGHT_DECAY: 1e-4
  # Longer warmup to gently ramp up LR and protect the Places365 weights
  WARMUP_EPOCHS: 5.0
  WARMUP_START_LR: 0.0005
  OPTIMIZING_METHOD: sgd

MODEL:
  NUM_CLASSES: 4          # Normal (0), Covered (1), Defocused (2), Moved (3)
  ARCH: slowfast
  MODEL_NAME: SlowFast
  LOSS_FUNC: cross_entropy
  DROPOUT_RATE: 0.5

TEST:
  ENABLE: True
  DATASET: uhctd
  BATCH_SIZE: 2

DATA_LOADER:
  ENABLE_MULTI_THREAD_DECODE: True
  NUM_WORKERS: 4
  PIN_MEMORY: True

NUM_GPUS: 1
NUM_SHARDS: 1
RNG_SEED: 42
OUTPUT_DIR: "/mnt/d/FYP/TamperingDetection/SlowFast-main/checkpoint"

AVA:
  BGR: False
